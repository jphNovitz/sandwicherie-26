security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto

    providers:
        in_memory:
            memory:
                users:
                    '%env(default:admin:ADMIN_IN_MEMORY_USERNAME)%':
                        password: '%env(default::ADMIN_IN_MEMORY_PASSWORD_HASH)%'
                        roles:
                            - ROLE_ADMIN
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
        chain_provider:
            chain:
                providers:
                    - in_memory
                    - app_user_provider

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: chain_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: admin
            logout:
                path: app_logout
                target: app_home

    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
